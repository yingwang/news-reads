site_name: "每日新闻 brief / Daily News Brief"
site_description: "每天早上把过去 24 小时全球新闻整理成一份结构化中文 brief：地缘政治、经济与市场、科技与 AI、科学与气候、社会与文化。"
site_url: https://yingwang.github.io/news-reads/
repo_url: https://github.com/yingwang/news-reads
repo_name: yingwang/news-reads
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yingwang

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - mdx_truly_sane_lists
  - toc:
      permalink: true
      permalink_title: 链接到此节
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - zh
  - awesome-pages

